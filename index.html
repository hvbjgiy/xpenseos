<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XpenseOS</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#060d18"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="XpenseOS"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#060d18;color:#c8d8f0;font-family:'DM Sans',sans-serif}
    #root{min-height:100vh}
    #splash{position:fixed;inset:0;background:#060d18;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
    #splash h1{font-family:'Orbitron',monospace;font-size:28px;color:#00d4ff;letter-spacing:4px;text-shadow:0 0 30px #00d4ff60}
    #splash h1 span{color:#00ff88}
    #splash p{font-family:'DM Mono',monospace;font-size:12px;color:#3a5070;margin-top:8px;letter-spacing:2px}
    #splash .dot{display:inline-block;animation:blink 1.2s infinite}
    #splash .dot:nth-child(2){animation-delay:.2s}
    #splash .dot:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;700&display=swap');
  </style>
</head>
<body>
  <div id="splash">
    <h1>XPENSE<span>OS</span></h1>
    <p>LOADING<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>
  </div>
  <div id="root"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
